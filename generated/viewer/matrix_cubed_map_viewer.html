<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matrix Cubed Map Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181b1e;
      --panel-2: #20252a;
      --line: #3d454d;
      --line-2: #59636e;
      --text: #e8ecef;
      --muted: #a9b2bb;
      --accent: #58c4a2;
      --event: #f4c95d;
      --door: #da7b55;
      --cell: #262b30;
      --cell-alt: #22272c;
      --focus: #8ed0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: #14171a;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
    }
    main {
      display: grid;
      grid-template-columns: 260px minmax(460px, 1fr) 340px;
      min-height: calc(100vh - 56px);
    }
    aside, section {
      min-width: 0;
    }
    .left, .right {
      background: var(--panel);
      border-right: 1px solid var(--line);
      overflow: auto;
      max-height: calc(100vh - 56px);
    }
    .right {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    .center {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 150px;
      min-height: calc(100vh - 56px);
      background: #121518;
    }
    .map-list {
      display: grid;
      gap: 4px;
      padding: 10px;
    }
    .map-button {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 2px;
    }
    .map-button:hover { background: var(--panel-2); }
    .map-button.active {
      border-color: var(--accent);
      background: #1b2c28;
    }
    .map-id { color: var(--muted); font-size: 12px; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    select {
      min-width: 220px;
      max-width: 44vw;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 10px;
    }
    .stat {
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }
    .canvas-wrap {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 18px;
    }
    canvas {
      width: min(78vh, 100%);
      max-width: 760px;
      aspect-ratio: 1 / 1;
      image-rendering: pixelated;
      border: 1px solid var(--line);
      background: var(--cell);
    }
    .asset-strip {
      border-top: 1px solid var(--line);
      background: #15191c;
      overflow-x: auto;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }
    .thumb {
      width: 108px;
      height: 112px;
      flex: 0 0 auto;
      display: grid;
      grid-template-rows: 84px 1fr;
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
    }
    .thumb img {
      max-width: 108px;
      max-height: 84px;
      object-fit: contain;
      image-rendering: pixelated;
      background: #08090a;
      border: 1px solid var(--line);
    }
    .thumb span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .panel {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    h2 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 650;
      color: var(--text);
    }
    .kv {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 6px 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .kv strong {
      color: var(--text);
      font-weight: 550;
    }
    .events {
      display: grid;
      gap: 8px;
    }
    .event {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #15191c;
    }
    .event.active {
      border-color: var(--focus);
      background: #142331;
    }
    .event-title {
      color: var(--event);
      font-size: 12px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .event-links {
      display: inline-flex;
      gap: 8px;
      flex: 0 0 auto;
    }
    .event-text {
      color: var(--text);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .cell-readout {
      color: var(--muted);
      min-height: 60px;
      font-size: 13px;
    }
    a { color: var(--focus); text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .left, .right { max-height: none; border: 0; border-bottom: 1px solid var(--line); }
      .center { min-height: 560px; }
      header { height: auto; min-height: 56px; flex-wrap: wrap; padding: 10px 12px; }
      select { max-width: 100%; min-width: 0; }
    }
  </style>
</head>

      <div class="panel">

    </aside>
  </main>

 EXPLOSION ROCKS THE BASE! THE DEMOLITION CHARGES HAVE DETONATED!'"}, "5": {"target": 34220, "text": "\"GUARDS STOP YOU. 'THE COMMAND CENTER IS OFF LIMITS.'\""}, "6": {"target": 34346, "text": "\"'ARMORY.'\""}, "7": {"target": 34347, "text": "\"'ARMORY.'\""}, "8": {"target": 34366, "text": "\"A NAME PLATE ON THIS DOOR READS, 'GEN. MAVROUDIS, BASE COMMANDER.'\""}, "9": {"target": 34428, "text": "\"THIS DOOR IS MARKED 'LASER CONTROL.'\""}, "10": {"target": 34467, "text": "'VARIOUS MAINTAINENCE ITEMS ARE STORED HERE.'"}, "11": {"target": 34504, "text": "\"'GUARD QUARTERS.'\""}, "12": {"target": 34529, "text": "'YOU ENTER THE COMMAND CENTER.'"}, "13": {"target": 35095, "text": "\"A SIGN ON THE WEST DOOR READS, 'CONFERENCE ROOM.' STENCILED ON THE EAST DOOR IS 'MESS HALL.'\""}, "14": {"target": 35176, "text": "'THE MESS HALL IS ' 'EMPTY.'"}, "15": {"target": 35305, "text": "'THIS IS A ILL-EQUIPPED KITCHEN. PROCESSED FOOD SUPPLIES LINE THE WALLS.'"}, "16": {"target": 35371, "text": "'YOU ENTER THE SECURITY AREA' '.'"}, "17": {"target": 35881, "text": "'THIS DOOR IS STENCILED ' \"'WOMAN\" \"'MEN\""}, "18": {"target": 35881, "text": "'THIS DOOR IS STENCILED ' \"'WOMAN\" \"'MEN\""}, "19": {"target": 35938, "text": "\"'CONFERENCE ROOM.'\""}, "20": {"target": 35964, "text": "'THE ARMORY IS POORLY STOCKED. ONLY A FEW RIFLES ARE HERE.'"}, "21": {"target": 36123, "text": "\"THIS IS THE BASE'S POWER CENTER. HUGE CABLES SNAKE IN AND OUT OF THIS ROOM.\""}, "22": {"target": 36192, "text": "\"'RESTRICTED ACCESS' IS PRINTED ON THE DOOR. YOU HEAR A STEADY HUM.\""}, "23": {"target": 36254, "text": "'THE LARGE CONFERENCE ROOM IS EMPTY, BUT RECENTLY USED.'"}, "24": {"target": 36434, "text": "\"MAVROUDIS' OFFICE IS IMMACULATE, AND SMELLS STRONGLY OF LEATHER. AGAINST THE EAST WALL IS A COMPUTER.\""}, "25": {"target": 36522, "text": "'THE SECURITY PROGRAM HAS BEEN TRIPPED. THE COMPUTER HAS LOCKED ITS FILES, AND THE BASE ALERT HAS BEEN SOUNDED.'"}, "26": {"target": 37236, "text": "\"THE GENERAL'S LIVING QUARTERS ARE SPARSELY FURNISHED.\""}, "27": {"target": 37288, "text": "'THE HUM OF MACHINERY FILLS THE ROOM. LARGE CONSOLES LINE THE WALLS.'"}, "28": {"target": 37343, "text": "'THIS ROOM APPEARS TO BE A DEDICATED COMMUNICATIONS AREA.'"}, "29": {"target": 37397, "text": "'<string at area2.selected_player_name>' ' NOTICES A RAM HEAVY CRUISER ORBITING THE BASE.'"}, "30": {"target": 37611, "text": "'THIS CONFERENCE ROOM IS DOMINATED BY RAM INSIGNIAS BOTH ON THE WALLS AND CARVED INTO THE TABLE.'"}, "31": {"target": 37695, "text": "'THIS ROOM HOLDS BRAND NEW EQUIPMENT. A MASTER CONTROL CONSOLE IS ON THE EAST WALL.'"}, "32": {"target": 37967, "text": "\"THIS DOOR READS 'LASER PLATFORM. DO NOT ENTER.'\""}, "33": {"target": 38015, "text": "'THE SMOKING RUINS OF THE CONSOLE ARE ALL THAT REMAIN.'"}, "34": {"target": 38853, "text": "'A LASER OF UNBELIEVABLE SIZE TOWERS ABOVE YOU -- YET STILL A SMALLER VERSION OF THE DOOMSDAY LASER.'"}, "35": {"target": 39247, "text": "'THE SECURITY MONITORS DISPLAY DIFFERENT SECTIONS OF THE BASE EACH MINUTE.' 'CURRENTLY, THE MONITOR IS DISPLAYING '"}, "36": {"target": 39930, "text": "'THE WALLS ARE LINED WITH BUNKS AND LOCKERS. THERE ARE GUARDS RESTING. THEY LOOK UP AT YOU IN SURPRISE.'"}, "37": {"target": 40213, "text": "\"THE GENERAL'S BATHROOM. UNDER THE SINK YOU FIND A WAD OF PAPER CONTAINING SOME NUMBERS. THEY APPEAR TO BE AN ACCESS CODE.\""}}}, "wallsets": {"geo_id": "35", "name": "Asteroid Base", "ecl_block": "35", "source_addr": "0x8035", "walldef_1": "255", "walldef_2": "255", "walldef_3": "11"}, "structuredUrl": "file:///home/jzatopa/.openclaw/workspace/matrix-cubed-re/generated/event_structured/geo_035_asteroid-base.structured.md", "pseudocodeUrl": "file:///home/jzatopa/.openclaw/workspace/matrix-cubed-re/generated/event_pseudocode/geo_035_asteroid-base.pseudo.md"}, {"id": 38, "name": "Losangelorg Sprawls", "bytes": 1026, "highest_event": 23, "event_counts": {"1": 1, "2": 1, "3": 1, "4": 1, "5": 1, "6": 1, "7": 1, "8": 1, H.\""}, "16": {"target": 36905, "text": "'ZACHARY IS HERE PROTECTED BY A RAM INFILTRATION TEAM.'"}, "17": {"target": 37062, "text": "'THERE IS A COMPUTER HERE. DO YOU ATTEMPT TO USE IT?'"}, "18": {"target": 37063, "text": "'THERE IS A COMPUTER HERE. DO YOU ATTEMPT TO USE IT?'"}, "19": {"target": 39057, "text": "'YOU PUT ZACHARY IN THE JAIL.' 'AN EMPTY CELL.'"}, "20": {"target": 39132, "text": "'AIRLOCK 1 IS BEFORE YOU.' 'THIS IS A CREW CABIN.'"}, "21": {"target": 39133, "text": "'AIRLOCK 1 IS BEFORE YOU.' 'THIS IS A CREW CABIN.'"}, "22": {"target": 40080, "text": "\"A GUARD APPROACHES. 'OUR SENSORS HAVE DETECTED UNUSUAL MAGNETIC READINGS FROM THE BASEMENT. THEY MAY BE INVOLVED IN YOUR INVESTIGATION. PLEASE KEEP THE DIRECTOR INFORMED OF ANY PROGRESS.'\""}, "23": {"target": 39304, "text": "'AIRLOCK 1 IS BEFORE YOU.' 'THIS IS A CREW CABIN.'"}, "24": {"target": 34095, "text": "\"'\" area1.event_word_20C \"'\""}, "26": {"target": 34095, "text": "\"'\" area1.event_word_20C \"'\""}, "27": {"target": 39957, "text": "'YOU SPOT THE SPY THAT ESCAPED! HE AND OTHERS ATTACK!'"}, "28": {"target": 39335, "text": "'THIS IS A CREW CABIN.'"}, "29": {"target": 34095, "text": "\"'\" area1.event_word_20C \"'\""}, "33": {"target": 40707, "text": "\"THE SECURITY CHIEF GREETS YOU. 'ONE OF MY MEN NOTED SOMEONE SUSPICIOUS ON THE CABIN LEVEL, BUT HE LOST THE MAN. YOU MIGHT WANT TO FOLLOW UP.'\""}, "34": {"target": 34095, "text": "\"'\" area1.event_word_20C \"'\""}, "36": {"target": 39381, "text": "\"A SIGN READS, 'AIRLOCK 2.'\""}, "37": {"target": 34095, "text": "\"'\" area1.event_word_20C \"'\""}, "38": {"target": 39715, "text": "'THERE IS A LOT OF JUNK HERE. DO YOU WISH TO SEARCH?'"}}}, "wallsets": {"geo_id": "82", "name": "NEO Installation", "ecl_block": "82", "source_addr": "", "walldef_1": "", "walldef_2": "", "walldef_3": ""}, "structuredUrl": "file:///home/jzatopa/.openclaw/workspace/matrix-cubed-re/generated/event_structured/geo_082_neo-installation.structured.md", "pseudocodeUrl": "fi     const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');
    const mapList = document.getElementById('mapList');
    const mapSelect = document.getElementById('mapSelect');
    const mapMeta = document.getElementById('mapMeta');
    const eventsEl = document.getElementById('events');
    const cellReadout = document.getElementById('cellReadout');
    const mapStat = document.getElementById('mapStat');
    const assetStrip = document.getElementById('assetStrip');
    let currentIndex = 0;
    let selectedCell = null;
    let selectedEventId = null;

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function init() {
      DATA.maps.forEach((map, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${String(map.id).padStart(3, '0')} ${map.name}`;
        mapSelect.appendChild(option);

        const button = document.createElement('button');
        button.className = 'map-button';
        button.innerHTML = `<span>${esc(map.name)}</span><span class="map-id">GEO ${String(map.id).padStart(3, '0')}</span>`;
        button.addEventListener('click', () => selectMap(index));
        mapList.appendChild(button);
      });
      mapSelect.addEventListener('change', event => selectMap(Number(event.target.value)));
      canvas.addEventListener('mousemove', event => handlePointer(event, false));
      canvas.addEventListener('click', event => handlePointer(event, true));
      renderAssets();
      selectMap(0);
    }

    function selectMap(index) {
      currentIndex = index;
      selectedCell = null;
      selectedEventId = null;
      mapSelect.value = String(index);
      [...mapList.children].forEach((button, i) => button.classList.toggle('active', i === index));
      render();
    }

    function render() {
      const map = DATA.maps[currentIndex];
      renderMapMeta(map);
      renderEvents(map);
      drawMap(map);
      cellReadout.textContent = '-';
      mapStat.textContent = `GEO ${String(map.id).padStart(3, '0')} / ${map.cells.length} cells`;
    }

    function renderMapMeta(map) {
      const wallsets = map.wallsets || {};
      const ecl = map.atlas?.ecl_block ?? wallsets.ecl_block ?? '';
      const values = [
        ['GEO', String(map.id).padStart(3, '0')],
        ['Name', map.name],
        ['ECL', ecl || '-'],
        ['Highest event', map.highest_event],
        ['Wallsets', [wallsets.walldef_1, wallsets.walldef_2, wallsets.walldef_3].filter(Boolean).join(', ') || '-'],
        ['Source', wallsets.source_addr || '-'],
      ];
      const links = [
        map.structuredUrl ? `<a href="${map.structuredUrl}">Structured</a>` : '',
        map.pseudocodeUrl ? `<a href="${map.pseudocodeUrl}">Pseudocode</a>` : '',
      ].filter(Boolean).join(' · ');
      mapMeta.innerHTML = values.map(([k, v]) => `<span>${esc(k)}</span><strong>${esc(v)}</strong>`).join('')
        + (links ? `<span>Files</span><strong>${links}</strong>` : '');
    }

    function renderEvents(map) {
      const events = map.atlas?.events || {};
      const rows = Object.entries(events).slice(0, 80);
      if (!rows.length) {
        eventsEl.innerHTML = '<div class="event"><div class="event-text">No decoded event text.</div></div>';
        return;
      }
      eventsEl.innerHTML = rows.map(([id, evt]) => `
        <div class="event ${String(selectedEventId) === String(id) ? 'active' : ''}" id="event-${esc(id)}" data-event-id="${esc(id)}">
          <div class="event-title">
            <span>Event ${esc(id)} · ${esc('0x' + Number(evt.target).toString(16).toUpperCase())}</span>
            <span class="event-links">${map.structuredUrl ? `<a href="${map.structuredUrl}">Structured</a>` : ''}</span>
          </div>
          <div class="event-text">${esc(evt.text || '')}</div>
        </div>
      `).join('');
      for (const node of eventsEl.querySelectorAll('.event[data-event-id]')) {
        node.addEventListener('click', () => {
          selectedEventId = node.dataset.eventId;
          const eventCell = DATA.maps[currentIndex].cells.find(c => String(c.event_id) === String(selectedEventId));
          if (eventCell) selectedCell = eventCell;
          renderEvents(DATA.maps[currentIndex]);
          drawMap(DATA.maps[currentIndex]);
          scrollSelectedEvent();
        });
      }
    }

    function drawMap(map) {
      const size = canvas.width;
      const cell = size / 16;
      ctx.clearRect(0, 0, size, size);
      for (const c of map.cells) {
        const x = c.col * cell;
        const y = c.row * cell;
        ctx.fillStyle = ((c.row + c.col) % 2) ? '#22272c' : '#262b30';
        ctx.fillRect(x, y, cell, cell);
        if (c.event_id) {
          const isSelectedEvent = String(c.event_id) === String(selectedEventId);
          ctx.fillStyle = isSelectedEvent ? 'rgba(142, 208, 255, 0.68)' : (c.event_flag ? 'rgba(244, 201, 93, 0.5)' : 'rgba(88, 196, 162, 0.36)');
          ctx.fillRect(x + 4, y + 4, cell - 8, cell - 8);
          ctx.fillStyle = '#101214';
          ctx.font = '18px system-ui';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(c.event_id), x + cell / 2, y + cell / 2);
        }
        if (c.door) {
          ctx.fillStyle = '#da7b55';
          ctx.fillRect(x + cell - 12, y + 5, 7, 7);

        ctx.lineWidth = 4;

      if (!value) return null;

      if (value === 8) return '#58c4a2';

    function drawWalls(c, x, y, cell) {
      ctx.lineWidth = 4;
      const walls = [
        ['north', x, y, x + cell, y],
        ['east', x + cell, y, x + cell, y + cell],
        ['south', x, y + cell, x + cell, y + cell],
        ['west', x, y, x, y + cell],
      ];
      for (const [key, x1, y1, x2, y2] of walls) {
        const color = wallColor(c[key]);
        if (!color) continue;
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }

    function handlePointer(event, selectEvent) {
      const rect = canvas.getBoundingClientRect();
      const scale = canvas.width / rect.width;
      const x = (event.clientX - rect.left) * scale;
      const y = (event.clientY - rect.top) * scale;
      const col = Math.max(0, Math.min(15, Math.floor(x / (canvas.width / 16))));
      const row = Math.max(0, Math.min(15, Math.floor(y / (canvas.height / 16))));
      const map = DATA.maps[currentIndex];
      const cell = map.cells.find(c => c.row === row && c.col === col);
      if (!cell) return;
      selectedCell = cell;
      if (selectEvent && cell.event_id) {
        selectedEventId = cell.event_id;
        renderEvents(map);
        scrollSelectedEvent();
      }
      cellReadout.innerHTML = `
        <div>Row <strong>${row}</strong>, Col <strong>${col}</strong></div>
        <div>Walls N/E/S/W: <strong>${cell.north}/${cell.east}/${cell.south}/${cell.west}</strong></div>
        <div>Event: <strong>${cell.event_id || '-'}</strong> ${cell.event_flag ? 'flagged' : ''}</div>
        <div>Door: <strong>${cell.door || '-'}</strong></div>
      `;
      drawMap(map);
    }

    function scrollSelectedEvent() {
      if (!selectedEventId) return;
      const node = document.getElementById(`event-${selectedEventId}`);
      if (node) node.scrollIntoView({ block: 'nearest' });
    }

    function renderAssets() {
      const gallery = DATA.assetGallery ? `<a href="${DATA.assetGallery}">Asset Gallery</a>` : '';
      assetStrip.innerHTML = DATA.assets.map(asset => `
        <div class="thumb"><img src="${asset.url}" alt=""><span>${esc(asset.name)}</span></div>
      `).join('') + (gallery ? `<div class="thumb"><span>${gallery}</span></div>` : '');
    }

    init();
  </script>
